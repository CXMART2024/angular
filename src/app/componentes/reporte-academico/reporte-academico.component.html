<div class="container-fluid reporte-page p-4">
  <!-- Header -->
  <div class="row align-items-center mb-3">
    <div class="col-md-6">
      <h2 class="">Reporte Rendimiento</h2>
    </div>

    <div class="col-md-6 d-flex justify-content-end">
      <select
        class="form-select reporte-select"
        (change)="obtenerCursosDeCiclo($event)"
        #selectCiclo
      >
        <option selected disabled>Seleccionar una opción</option>

        <option *ngFor="let ciclo of listCiclo" [value]="ciclo.id">
          {{ ciclo.nombre_ciclo }}
        </option>
      </select>
    </div>
  </div>

  <!-- Card Principal -->
  <div class="card reporte-main-card">
    <div class="card-body">
      <div class="row justify-content-center align-items-stretch g-4">
        <!-- PROMEDIO -->
        <div class="col-lg-4 col-md-5 d-flex">
          <div class="metric-card w-100">
            <h4 class="metric-title">Promedio Nota</h4>

            <div
              class="metric-value"
              *ngIf="promedio !== null && promedio !== undefined"
            >
              {{ promedio }}/20
            </div>
          </div>
        </div>

        <!-- GRAFICO -->
        <div class="col-lg-6 col-md-7 d-flex">
          <div class="metric-card w-100">
            <h4 class="metric-title">Promedio por Ciclo</h4>

            <div class="chart-container">
              <img
                src="https://blobauroranuevo.blob.core.windows.net/images3d/Frame 112.png"
                class="img-fluid"
                alt="Promedio por ciclo"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
