<div class="sidebar h-100 d-flex flex-column">
  <!-- Logo -->
  <div class="logo-container mb-5">
    <img
      src="https://blobauroranuevo.blob.core.windows.net/images3d/fxemoji_graduationcap (1).png"
      alt="Logo"
      class="logo"
    />
  </div>

  <!-- Menú -->
  <div class="menu-links">
    <a
      class="sidebar-link active"
      routerLink="/contabilidad"
      routerLinkActive="active"
    >
      <img
        src="https://blobauroranuevo.blob.core.windows.net/images3d/Money Calculator_blue.svg"
        class="menu-icon"
      />

      <span> Contabilidad </span>
    </a>
  </div>

  <!-- Parte inferior -->
  <div class="bottom-actions">
    <button class="action-btn" (click)="logout()">
      <i class="bi bi-box-arrow-left"></i>
    </button>
  </div>
</div>
